# SII PE 默认配置

llm:
  # API keys 建议通过环境变量 SII_PE_API_KEYS 设置（逗号分隔）
  # api_keys: []
  api_base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  temperature: 1.0
  max_tokens: 8192

evaluation:
  max_concurrency: 10
  num_trials: 5

optimizer:
  # 优化器使用独立的 LLM provider，应选最强模型
  # 如评测用 DeepSeek，优化器可用 Claude/GPT-4o/deepseek-reasoner
  # 未配置时自动 fallback 到评测的 api_keys + api_base_url
  # optimizer_api_keys: []
  # optimizer_api_base_url: "https://api.anthropic.com/v1"
  optimizer_model: "deepseek-chat"
  max_iterations: 20
  population_size: 50
  survivors_per_gen: 10

output:
  result_dir: "results"
  log_dir: "logs"
